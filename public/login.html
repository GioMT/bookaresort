<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Login</title>
  
  <!-- Prevent Name Flash -->
  <script>
    try {
      const savedTheme = localStorage.getItem('abhc_theme');
      if (savedTheme) document.documentElement.setAttribute('data-theme', savedTheme);

      const scRaw = localStorage.getItem('ABHC_siteContent');
      if (scRaw) {
        const parsed = JSON.parse(scRaw);
        if (parsed && parsed.data && Array.isArray(parsed.data)) {
          const bizItem = parsed.data.find(i => i.key === 'business_name');
          if (bizItem && bizItem.value) {
            document.title = bizItem.value + ' – Admin Login';
          }
        }
      }
    } catch (e) {}
  </script>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { background: var(--aqua-deep); display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    .login-card { background: white; padding: 3rem 2.5rem; border-radius: 20px; width: 100%; max-width: 400px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); text-align: center; position: relative; z-index: 10; }
    .login-logo { font-family: var(--font-serif); font-size: 2rem; color: var(--text-dark); margin-bottom: 0.2rem; }
    .login-logo span { color: var(--sunset); }
    .btn-login { width: 100%; background: var(--sunset); color: white; border: none; padding: 0.9rem; border-radius: 8px; font-weight: 500; font-family: var(--font-sans); cursor: pointer; transition: 0.2s; margin-top: 1rem; font-size: 1rem; }
    .btn-login:hover { background: var(--sunset-dark); transform: translateY(-2px); }
    #loginError { color: var(--danger); font-size: 0.85rem; margin-top: 1.2rem; display: none; background: #FEF2F2; padding: 0.8rem; border-radius: 8px; border: 1px solid #FCA5A5;}
  </style>
</head>
<body>

  <div class="hero-bg" style="position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden;"></div>

  <div class="login-card">
    <div class="login-logo" id="loginLogoText"><span>Secure Admin</span></div>
    <script>
      try {
        const scRaw = localStorage.getItem('ABHC_siteContent');
        if (scRaw) {
          const parsed = JSON.parse(scRaw);
          if (parsed && parsed.data && Array.isArray(parsed.data)) {
            const bizItem = parsed.data.find(i => i.key === 'business_name');
            if (bizItem && bizItem.value) {
              const words = bizItem.value.split(' ');
              const logoEl = document.getElementById('loginLogoText');
              if (words.length > 1) {
                const first = words.shift();
                logoEl.innerHTML = `${first} <span>${words.join(' ')}</span>`;
              } else {
                logoEl.innerHTML = bizItem.value;
              }
            }
          }
        }
      } catch (e) {}
    </script>
    <p style="color:var(--text-muted);font-size:0.85rem;margin-bottom:2rem;letter-spacing:0.05em;text-transform:uppercase;">Secure Admin Portal</p>

    <form id="loginForm">
      <div class="form-group" style="text-align:left;">
        <label>Email Address</label>
        <input type="email" id="email" required placeholder="staff@email.com">
      </div>
      <div class="form-group" style="text-align:left;">
        <label>Password</label>
        <input type="password" id="password" required placeholder="••••••••">
      </div>
      <button type="submit" class="btn-login" id="loginBtn">Access Dashboard</button>
      <div id="loginError"></div>
    </form>
    
    <a href="index.html" style="display:block;margin-top:1.5rem;font-size:0.8rem;color:var(--text-muted);text-decoration:none;">← Return to Guest Site</a>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/theme-animations.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
      const errorDiv = document.getElementById('loginError');

      btn.textContent = 'Authenticating...';
      errorDiv.style.display = 'none';

      const { error } = await window.supa.auth.signInWithPassword({ email, password });

      if (error) {
        errorDiv.textContent = error.message;
        errorDiv.style.display = 'block';
        btn.textContent = 'Access Dashboard';
      } else {
        // Success! Redirect to the locked page.
        window.location.href = 'admin.html';
      }
    });
  </script>
</body>
</html>
